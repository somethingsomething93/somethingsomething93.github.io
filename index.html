// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

let fontSize = 18;
let charWidth;
let rows;

const rowData = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  ctx.font = `${fontSize}px monospace`;
  charWidth = ctx.measureText("0").width;

  rows = Math.ceil(canvas.height / fontSize);

  rowData.length = 0;

  for (let y = 0; y < rows; y++) {
    rowData.push({
      offset: Math.random() * canvas.width,
      speed: 60 + Math.random() * 40,
      direction: y % 2 === 0 ? -1 : 1,
text:
  y % 2 === 0
    ? "10".repeat(200)
    : "01".repeat(200)
    });
  }
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let lastTime = 0;

function draw(time) {
  const delta = (time - lastTime) / 1000;
  lastTime = time;

  ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = `${fontSize}px monospace`;

  for (let y = 0; y < rows; y++) {
    const row = rowData[y];

    row.offset += row.speed * row.direction * delta;

    if (row.direction === -1 && row.offset < -charWidth * 2) {
      row.offset = 0;
    }

    if (row.direction === 1 && row.offset > charWidth * 2) {
      row.offset = 0;
    }

    ctx.fillStyle = "rgba(0, 255, 0, 0.28)";

    const repeatCount = Math.ceil(canvas.width / (row.text.length * charWidth)) + 3;

    for (let i = -1; i < repeatCount; i++) {
      ctx.fillText(
        row.text,
        i * row.text.length * charWidth + row.offset,
        y * fontSize
      );
    }
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
